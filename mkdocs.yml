site_name: DezoWiki
site_description: Tematická wiki tvrzení a postojů z přepisů videí a rozhovorů

theme:
  name: material
  language: cs
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

docs_dir: wiki

markdown_extensions:
  - toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

nav:
  - Úvod: index.md
  - Témata:
    - DSA a cenzura: dsa-cenzura.md
    - FARA a neziskovky: fara-neziskovky.md
    - COVID a vakcíny: covid-vakciny.md
    - Média a propaganda: media-propaganda.md
    - Kauzy a korupce: kauzy.md
    - Suverenita a EU: suverenita-eu.md
    - Politický systém: politicky-system.md
    - Konspirační teorie: konspiraci.md
    - Ceny energií: ceny-energie.md
    - Rodina a děti: rodina-deti.md
  - Osoby:
    - Jindřich Rajchl: osoby/rajchl.md
    - Lenka Tarabová: osoby/tarabova.md
    - Konspirátor Boldy: osoby/boldy.md
    - Pavel Zítko: osoby/zitko.md
    - Jiří Černohorský: osoby/cernohorsky.md
  - Zdroje: _zdroje.md
